  <rect x="536" y="350" width="44" height="178" fill="#221438" rx="2"/>
  <polygon points="496,374 583,346 670,374" fill="#1c1030" opacity="0.8"/>
  <!-- Arched windows glowing -->
  <rect x="508" y="395" width="13" height="20" rx="6" fill="#f8c058" opacity="0.45"/>
  <rect x="528" y="395" width="13" height="20" rx="6" fill="#f8c058" opacity="0.45"/>
  <rect x="548" y="395" width="13" height="20" rx="6" fill="#f8c058" opacity="0.45"/>
  <rect x="568" y="395" width="13" height="20" rx="6" fill="#f8c058" opacity="0.45"/>
  <rect x="508" y="428" width="13" height="18" rx="6" fill="#f8c058" opacity="0.35"/>
  <rect x="548" y="428" width="13" height="18" rx="6" fill="#f8c058" opacity="0.35"/>
