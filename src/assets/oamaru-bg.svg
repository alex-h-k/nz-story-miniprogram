  <!-- Light beams -->
  <line x1="82" y1="415" x2="28" y2="382" stroke="#f8e040" stroke-width="2.5" opacity="0.32"/>
  <line x1="82" y1="415" x2="148" y2="385" stroke="#f8e040" stroke-width="2.5" opacity="0.32"/>
  <!-- Base -->
  <rect x="64" y="525" width="36" height="12" fill="#c8bca8" rx="2"/>
</g>

