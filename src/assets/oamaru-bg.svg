  <circle cx="195" cy="55" r="1.5"/>
  <circle cx="318" cy="95" r="1"/>
  <circle cx="418" cy="42" r="2"/>
  <circle cx="98" cy="145" r="1.5"/>
  <circle cx="678" cy="88" r="1.5"/>
  <circle cx="718" cy="125" r="1"/>
  <circle cx="558" cy="65" r="1.5"/>
  <circle cx="248" cy="38" r="1"/>
  <circle cx="488" cy="110" r="1"/>
</g>

<!-- Setting sun -->
<circle cx="585" cy="515" r="48" fill="#f8d838" opacity="0.92"/>
<circle cx="585" cy="515" r="64" fill="#f8c028" opacity="0.28"/>
<circle cx="585" cy="515" r="80" fill="#f8a018" opacity="0.14"/>

