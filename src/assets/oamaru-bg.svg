<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 1334">
<defs>
  <linearGradient id="odusk" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#2a1050"/>
    <stop offset="22%" stop-color="#7028a0"/>
    <stop offset="45%" stop-color="#d84828"/>
    <stop offset="65%" stop-color="#f07828"/>
    <stop offset="82%" stop-color="#f8b848"/>
    <stop offset="100%" stop-color="#f8e080"/>
  </linearGradient>
  <linearGradient id="oocean" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#186090"/>
    <stop offset="55%" stop-color="#0c4060"/>
    <stop offset="100%" stop-color="082840"/>
  </linearGradient>
  <linearGradient id="orock" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#888070"/>
    <stop offset="100%" stop-color="#5a5040"/>
  </linearGradient>
  <linearGradient id="oshore" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#483830"/>
    <stop offset="100%" stop-color="#302820"/>
  </linearGradient>
</defs>

<!-- Dusk sky -->
<rect width="750" height="1334" fill="url(#odusk)"/>

<!-- Stars (faint, dusk) -->
<g fill="#ffffff" opacity="0.45">
