name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test -- --ci --no-coverage

  build:
    name: Build (WeChat)
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build for WeChat miniprogram
        run: npm run build:weapp

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-weapp-${{ github.sha }}
          path: dist/
          retention-days: 7
